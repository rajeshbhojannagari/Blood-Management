<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
</head>
<body>

<h1>Search Results</h1>

<table border="1">

    <tr>
        <th>Name</th>
        <th>Blood Group</th>
        <th>City</th>
        <th>Phone</th>
    </tr>

    {% for donor in result %}

    <tr>

        <td>{{ donor.name }}</td>
        <td>{{ donor.blood_group }}</td>
        <td>{{ donor.city }}</td>
        <td>{{ donor.phone }}</td>

    </tr>

    {% endfor %}

</table>

</body>
</html>
